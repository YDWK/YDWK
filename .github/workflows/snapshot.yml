# If the version contains the SNAPSHOT suffix it will run publishYdwkPublicationToMavenCentralRepository
name: Snapshot

on:
  push:
    branches:
      - 'master'

jobs:
  snapshot:
    name: Create Snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read Version
        id: read-version
        run: |
          version=`cat gradle.properties | sed -n "s/^.*version\s*=\s*\(\S*\).*$/\1/p"`
          echo "version<<EOF" >>$GITHUB_OUTPUT
          echo "$version" >>$GITHUB_OUTPUT
          echo "EOF" >>$GITHUB_OUTPUT

      - name: Run maven snapshot
        if: ${{ endsWith(steps.read-version.outputs.version, 'SNAPSHOT') }}
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenToken: ${{ secrets.MAVEN_TOKEN || secrets.MAVEN_PASSWORD }}
